<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Bhakundo TV</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0f;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 48px;
    background: #111118;
    border-bottom: 1px solid #1e1e2e;
    flex-shrink: 0;
  }

  .title {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.2px;
    color: #fff;
  }

  .title span {
    color: #ef4444;
  }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .player-wrap {
    width: 100%;
    max-width: 960px;
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    background: #000;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
  }

  /* Mobile: fill screen edge to edge, no padding, no border radius */
  @media (max-width: 600px) {
    main { padding: 0; }
    .player-wrap { border-radius: 0; box-shadow: none; }
  }

  .aspect {
    aspect-ratio: 16 / 9;
    position: relative;
  }

  /* Loading indicator */
  .loader {
    position: absolute;
    inset: 0;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0a0a0f;
    gap: 16px;
    transition: opacity 0.4s ease;
  }

  .loader.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid #1e1e2e;
    border-top-color: #ef4444;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loader-text {
    font-size: 13px;
    color: #64748b;
    letter-spacing: 0.3px;
  }

  iframe {
    display: block;
    width: 100%;
    height: 100%;
    border: none;
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .shield {
    position: absolute;
    inset: 0;
    z-index: 10;
    cursor: pointer;
  }
</style>

<header>
  <div class="title">Bhakundo <span>TV</span></div>
</header>

<main>
  <div class="player-wrap">
    <div class="aspect">

      <div class="loader" id="loader">
        <div class="spinner"></div>
        <div class="loader-text">Loading stream...</div>
      </div>

      <iframe
        id="player"
        src=""
        allowfullscreen
        allow="autoplay; fullscreen; picture-in-picture; playsinline"
        referrerpolicy="no-referrer"
        title="Live Stream"
      ></iframe>

      <div class="shield" id="shield"></div>

    </div>
  </div>
</main>

<script>
  const player = document.getElementById('player')
  const shield = document.getElementById('shield')
  const loader = document.getElementById('loader')
  let timer = null

  // Read URL from ?bhUrl= param
  const params = new URLSearchParams(window.location.search)
  const bhUrl = params.get('bhUrl')

  if (!bhUrl) {
    loader.querySelector('.spinner').style.display = 'none'
    loader.querySelector('.loader-text').textContent = 'Please provide an embedded working URL.'
  } else {
    player.src = bhUrl

    // Hide loader once iframe loads
    player.addEventListener('load', function() {
      setTimeout(function() { loader.classList.add('hidden') }, 800)
    })

    // Fallback: hide loader after 8s regardless
    setTimeout(function() { loader.classList.add('hidden') }, 8000)
  }

  // Click/touch overlay → pass through to iframe for 5s then lock
  function activatePassthrough() {
    player.style.pointerEvents = 'auto'
    shield.style.pointerEvents = 'none'
    clearTimeout(timer)
    timer = setTimeout(function() {
      player.style.pointerEvents = 'none'
      shield.style.pointerEvents = 'auto'
    }, 5000)
  }

  shield.addEventListener('click', activatePassthrough)
  shield.addEventListener('touchstart', activatePassthrough, { passive: true })

  // Kill popups instantly by refocusing
  window.addEventListener('blur', function() {
    setTimeout(function() { window.focus() }, 0)
  })

  // Block page redirects
  window.addEventListener('beforeunload', function(e) {
    e.preventDefault()
    e.returnValue = ''
  })

  // Block window.open popups
  window.open = function() { return null }
</script>

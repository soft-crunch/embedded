<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Bhakundo TV</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0f;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 48px;
    background: #111118;
    border-bottom: 1px solid #1e1e2e;
    flex-shrink: 0;
  }

  .title {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.2px;
    color: #fff;
  }

  .title span {
    color: #ef4444;
  }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .player-wrap {
    width: 100%;
    max-width: 960px;
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    background: #000;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
  }

  /* Mobile: fill screen edge to edge, no padding, no border radius */
  @media (max-width: 600px) {
    main { padding: 0; }
    .player-wrap { border-radius: 0; box-shadow: none; }
  }

  .aspect {
    aspect-ratio: 16 / 9;
    position: relative;
  }

  /* Loading indicator */
  .loader {
    position: absolute;
    inset: 0;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0a0a0f;
    gap: 16px;
    transition: opacity 0.4s ease;
  }

  .loader.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid #1e1e2e;
    border-top-color: #ef4444;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loader-text {
    font-size: 13px;
    color: #64748b;
    letter-spacing: 0.3px;
  }

  iframe {
    display: block;
    width: 100%;
    height: 100%;
    border: none;
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .shield {
    position: absolute;
    inset: 0;
    z-index: 10;
    cursor: pointer;
  }
</style>

<header>
  <div class="title">Bhakundo <span>TV</span></div>
</header>

<main>
  <div class="player-wrap">
    <div class="aspect">

      <div class="loader" id="loader">
        <div class="spinner"></div>
        <div class="loader-text">Loading stream...</div>
      </div>

      <iframe
        id="player"
        src=""
        sandbox="allow-scripts allow-same-origin allow-presentation allow-forms allow-pointer-lock"
        allowfullscreen
        allow="autoplay; fullscreen; picture-in-picture; playsinline; encrypted-media; screen-wake-lock"
        referrerpolicy="no-referrer"
        title="Live Stream"
      ></iframe>

      <div class="shield" id="shield"></div>

    </div>
  </div>
</main>

<script>
  const player = document.getElementById('player')
  const shield = document.getElementById('shield')
  const loader = document.getElementById('loader')
  let timer = null

  // ── Read URL param ──────────────────────────────────────────────
  const params = new URLSearchParams(window.location.search)
  const bhUrl = params.get('bhUrl')

  if (!bhUrl) {
    loader.querySelector('.spinner').style.display = 'none'
    loader.querySelector('.loader-text').textContent = 'Please provide an embedded working URL.'
  } else {
    player.src = bhUrl
    player.addEventListener('load', function() {
      setTimeout(function() { loader.classList.add('hidden') }, 800)
    })
    setTimeout(function() { loader.classList.add('hidden') }, 8000)
  }

  // ── Click/touch overlay passthrough ─────────────────────────────
  function activatePassthrough() {
    inPassthrough = true
    player.style.pointerEvents = 'auto'
    shield.style.pointerEvents = 'none'
    clearTimeout(timer)
    timer = setTimeout(function() {
      inPassthrough = false
      player.style.pointerEvents = 'none'
      shield.style.pointerEvents = 'auto'
    }, 2000) // 2s only — enough for play/pause, not enough for ad to breathe
  }
  shield.addEventListener('click', activatePassthrough)
  shield.addEventListener('touchstart', activatePassthrough, { passive: true })

  // ── BLOCKING ─────────────────────────────────────────────────────

  const SAFE_URL = window.location.href
  let inPassthrough = false
  let iframeLoaded = false

  // Lock window.open via defineProperty so iframe cannot override it
  try {
    Object.defineProperty(window, 'open', {
      value: function() { return null },
      writable: false,
      configurable: false
    })
  } catch(e) { window.open = function() { return null } }

  // Block document.write
  document.write = function() {}
  document.writeln = function() {}

  // Block history tricks
  try {
    history.pushState = function() {}
    history.replaceState = function() {}
  } catch(e) {}

  // Navigation API — Chrome 102+ — fires BEFORE navigation happens
  // Cancels cross-origin iframe attempts to navigate the top window
  if (window.navigation) {
    window.navigation.addEventListener('navigate', function(e) {
      try {
        if (e.destination.url !== SAFE_URL) {
          e.preventDefault()
        }
      } catch(err) {}
    })
  }

  // beforeunload — always active — shows "Leave site?" dialog as last resort
  window.addEventListener('beforeunload', function(e) {
    e.preventDefault()
    e.returnValue = ''
    return ''
  })

  // Blur → focus back instantly to kill any popup that opened
  // Run in a tight loop for 2 seconds after blur to fight persistent popups
  window.addEventListener('blur', function() {
    let attempts = 0
    const refocus = setInterval(function() {
      window.focus()
      attempts++
      if (attempts > 20) clearInterval(refocus) // stop after 2s
    }, 100)
  })

  // If iframe fires load again = it navigated internally → lock and reset
  player.addEventListener('load', function() {
    if (iframeLoaded && bhUrl) {
      clearTimeout(timer)
      inPassthrough = false
      player.style.pointerEvents = 'none'
      shield.style.pointerEvents = 'auto'
      // Reload original src in case iframe navigated away
      player.src = bhUrl
    }
    iframeLoaded = true
  })

  // Watchdog — 50ms polling — if URL changed somehow, snap back
  setInterval(function() {
    if (window.location.href !== SAFE_URL) {
      window.location.replace(SAFE_URL)
    }
  }, 50)
</script>
